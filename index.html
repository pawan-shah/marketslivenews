<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trader Terminal Live</title>

<style>

:root{
  --bg:#050505;
  --card:#101010;
  --border:#1e1e1e;
  --text:#ffffff;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Arial,sans-serif;
}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(5,5,5,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:1400px;
  margin:auto;
  padding:18px 20px;
}

.logo{
  font-size:30px;
  font-weight:800;
}

.live{
  color:#ff4d4d;
  font-size:14px;
  margin-top:6px;
}

.main{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  transition:0.25s;
  animation:fadeIn 0.4s ease;
}

.card:hover{
  border-color:#333;
  transform:translateY(-2px);
}

.badge{
  display:inline-block;
  background:#2b0c0c;
  color:#ffb4b4;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:12px;
}

.headline-link{
  text-decoration:none;
  color:white;
}

.headline-link:hover h2{
  color:#60a5fa;
}

.card h2{
  font-size:20px;
  line-height:1.5;
  margin-bottom:10px;
}

.publisher{
  color:var(--muted);
  font-size:14px;
  margin-bottom:12px;
}

.meta{
  color:var(--muted);
  font-size:13px;
}

.footer{
  text-align:center;
  color:var(--muted);
  padding:35px 20px;
  border-top:1px solid var(--border);
  margin-top:40px;
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(8px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<header class="header">

<div class="header-inner">

<div class="logo">
Trader Terminal
</div>

<div class="live">
LIVE • Auto updates every 10 seconds
</div>

</div>

</header>

<main class="main">

<div id="news" class="grid"></div>

</main>

<div class="footer">
Real-time trader-critical market intelligence
</div>

<script>

// CLEAN TITLE
function cleanTitle(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")[0]
      .trim();

  }

  return title;

}

// SOURCE
function getSourceName(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")
      .pop()
      .trim();

  }

  return "";

}

// TIME FORMAT
function formatTime(dateString){

  const now = new Date();

  const date = new Date(dateString);

  const seconds =
    Math.floor((now - date)/1000);

  const minutes =
    Math.floor(seconds/60);

  const hours =
    Math.floor(minutes/60);

  const days =
    Math.floor(hours/24);

  if(minutes < 1){
    return "Just now";
  }

  if(minutes < 60){
    return minutes + " minutes ago";
  }

  if(hours < 24){
    return hours + " hours ago";
  }

  return days + " days ago";

}

async function fetchNews(){

  try{

    // STRICT TRADER NEWS QUERY
    const query =
      "stock market OR crypto OR bitcoin OR federal reserve OR inflation OR recession OR interest rates OR oil prices OR Nasdaq OR S&P 500 OR Dow Jones";

    const rssUrl =
      "https://news.google.com/rss/search?q="
      + encodeURIComponent(query)
      + "&hl=en-US&gl=US&ceid=US:en";

    const api =
      "https://api.rss2json.com/v1/api.json?rss_url="
      + encodeURIComponent(rssUrl);

    const response = await fetch(api);

    const data = await response.json();

    let items = data.items || [];

    // SORT NEWEST FIRST
    items.sort((a,b)=>
      new Date(b.pubDate) -
      new Date(a.pubDate)
    );

    // PRIORITIZE LATEST NEWS
    const latestNews = items.filter(item=>{

      const diff =
        (new Date() - new Date(item.pubDate))
        / 1000 / 60 / 60;

      return diff <= 24;

    });

    // IF LESS THAN 50 NEWS,
    // INCLUDE OLDER NEWS ALSO
    if(latestNews.length >= 50){

      items = latestNews;

    }else{

      items = items.filter(item=>{

        const diff =
          (new Date() - new Date(item.pubDate))
          / 1000 / 60 / 60 / 24;

        // MAX 30 DAYS OLD
        return diff <= 30;

      });

    }

    // REMOVE DUPLICATES
    const unique = [];

    const seen = new Set();

    items.forEach(item=>{

      const title =
        cleanTitle(item.title)
        .toLowerCase()
        .trim();

      if(!seen.has(title)){

        seen.add(title);

        unique.push(item);

      }

    });

    renderNews(unique.slice(0,100));

  }catch(error){

    console.error(error);

  }

}

function renderNews(news){

  const container =
    document.getElementById("news");

  let html = "";

  news.forEach((item,index)=>{

    const title =
      cleanTitle(item.title);

    html += `

      <article class="card">

        <div class="badge">

          ${
            index < 5
            ? 'BREAKING'
            : 'LIVE UPDATE'
          }

        </div>

        <a
          href="${item.link}"
          target="_blank"
          class="headline-link"
        >

          <h2>
            ${title}
          </h2>

          <div class="publisher">
            - ${getSourceName(item.title)}
          </div>

        </a>

        <div class="meta">
          ${formatTime(item.pubDate)}
        </div>

      </article>

    `;

  });

  container.innerHTML = html;

}

// INITIAL LOAD
fetchNews();

// AUTO REFRESH EVERY 10 SECONDS
setInterval(fetchNews,10000);

</script>

</body>
</html>
