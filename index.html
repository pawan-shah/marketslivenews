<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Markets Intelligence Dashboard</title>

<style>

:root{
  --bg:#0a0a0a;
  --card:#111111;
  --border:#1e1e1e;
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#16a34a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Arial,sans-serif;
}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:1200px;
  margin:auto;
  padding:18px;
}

.logo{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

.search-wrap{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

.search-wrap input{
  flex:1;
  background:#111;
  border:1px solid var(--border);
  color:white;
  padding:14px 16px;
  border-radius:12px;
  font-size:15px;
  outline:none;
}

.search-wrap button{
  background:#2563eb;
  border:none;
  color:white;
  padding:14px 18px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
}

.topics{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
}

.topics::-webkit-scrollbar{
  display:none;
}

.topics button{
  background:#131313;
  border:1px solid var(--border);
  color:white;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  font-size:13px;
}

.topics button:hover{
  border-color:#333;
}

.main{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.status{
  color:var(--muted);
  margin-bottom:20px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#2c2c2c;
}

.headline-link{
  text-decoration:none;
  color:white;
  display:block;
}

.headline-link:hover h2{
  color:#60a5fa;
}

.card h2{
  font-size:21px;
  line-height:1.5;
  margin-bottom:10px;
}

.publisher{
  color:var(--muted);
  font-size:14px;
  margin-bottom:14px;
}

.meta{
  color:var(--muted);
  font-size:13px;
}

.badge{
  display:inline-block;
  background:#1f2937;
  color:#93c5fd;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:14px;
}

.footer{
  text-align:center;
  color:var(--muted);
  padding:40px 20px;
  border-top:1px solid var(--border);
  margin-top:40px;
}

@media(max-width:768px){

  .search-wrap{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<header class="header">

<div class="header-inner">

<div class="logo">
Markets Intelligence
</div>

<div class="search-wrap">

<input
type="text"
id="query"
placeholder="Search market, economy or crypto news..."
>

<button onclick="loadNews(document.getElementById('query').value)">
Search
</button>

</div>

<div class="topics">

<button onclick="loadNews('global stock market')">
Stock Market
</button>

<button onclick="loadNews('crypto market bitcoin ethereum')">
Crypto
</button>

<button onclick="loadNews('global economy inflation recession')">
Economy
</button>

<button onclick="loadNews('federal reserve interest rates')">
Interest Rates
</button>

<button onclick="loadNews('oil prices global markets')">
Oil
</button>

<button onclick="loadNews('US China economy markets')">
US-China
</button>

<button onclick="loadNews('AI companies stock market')">
AI Stocks
</button>

<button onclick="loadNews('startup funding market')">
Startups
</button>

</div>

</div>

</header>

<main class="main">

<div id="status" class="status">
Loading latest market intelligence...
</div>

<div id="news" class="grid"></div>

</main>

<div class="footer">
Live market, economy & crypto intelligence • Refreshes every 60 seconds
</div>

<script>

let currentTopic =
  "global stock market crypto economy";

document
.getElementById("query")
.addEventListener("keypress",function(event){

  if(event.key === "Enter"){

    loadNews(
      document.getElementById("query").value
    );

  }

});

// INITIAL LOAD
loadNews(currentTopic);

// AUTO REFRESH
setInterval(()=>{

  loadNews(currentTopic);

},60000);

// CLEAN TITLE
function cleanTitle(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")[0]
      .trim();

  }

  return title;

}

// SOURCE NAME
function getSourceName(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")
      .pop()
      .trim();

  }

  return "";

}

// TIME FORMAT
function formatTime(dateString){

  const now = new Date();

  const date = new Date(dateString);

  const seconds =
    Math.floor((now - date)/1000);

  const minutes =
    Math.floor(seconds/60);

  const hours =
    Math.floor(minutes/60);

  const days =
    Math.floor(hours/24);

  if(minutes < 1){
    return "Just now";
  }

  if(minutes < 60){
    return minutes + " minutes ago";
  }

  if(hours < 24){
    return hours + " hours ago";
  }

  return days + " days ago";

}

async function loadNews(topic){

  if(!topic) return;

  currentTopic = topic;

  document.getElementById("status").innerHTML =
    "Loading latest market intelligence...";

  try{

    // BROADER MARKET + ECONOMY QUERY
    const searchQuery =
      topic +
      " stock market crypto economy inflation finance federal reserve";

    const rssUrl =
      "https://news.google.com/rss/search?q="
      + encodeURIComponent(searchQuery);

    const api =
      "https://api.rss2json.com/v1/api.json?rss_url="
      + encodeURIComponent(rssUrl);

    const response = await fetch(api);

    const data = await response.json();

    const items = data.items || [];

    // SORT NEWEST FIRST
    items.sort((a,b)=>
      new Date(b.pubDate) -
      new Date(a.pubDate)
    );

    // REMOVE DUPLICATES
    const seen = new Set();

    let html = "";

    items.slice(0,40).forEach(item=>{

      const title =
        cleanTitle(item.title);

      const key =
        title.toLowerCase().trim();

      if(seen.has(key)){
        return;
      }

      seen.add(key);

      html += `

        <article class="card">

          <div class="badge">
            LIVE MARKET UPDATE
          </div>

          <a
            href="${item.link}"
            target="_blank"
            class="headline-link"
          >

            <h2>
              ${title}
            </h2>

            <div class="publisher">
              - ${getSourceName(item.title)}
            </div>

          </a>

          <div class="meta">
            ${formatTime(item.pubDate)}
          </div>

        </article>

      `;

    });

    document.getElementById("news").innerHTML =
      html;

    document.getElementById("status").innerHTML =
      "Showing latest results for: " + topic;

  }catch(error){

    console.error(error);

    document.getElementById("status").innerHTML =
      "Failed to fetch latest market intelligence.";

  }

}

</script>

</body>
</html>
