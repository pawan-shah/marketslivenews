<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traders Terminal</title>

<style>

:root{
  --bg:#050505;
  --card:#101010;
  --border:#1f1f1f;
  --text:#ffffff;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#080808;
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:1400px;
  margin:auto;
  padding:18px 20px;
}

.logo{
  font-size:30px;
  font-weight:800;
}

.live{
  color:#ff4d4d;
  font-size:14px;
  margin-top:6px;
}

.main{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.loading{
  color:var(--muted);
  margin-bottom:20px;
  font-size:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  transition:0.2s;
}

.card:hover{
  border-color:#333;
  transform:translateY(-2px);
}

.badge{
  display:inline-block;
  background:#2b0c0c;
  color:#ffb4b4;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:12px;
}

.headline-link{
  text-decoration:none;
  color:white;
}

.headline-link:hover h2{
  color:#60a5fa;
}

.card h2{
  font-size:20px;
  line-height:1.5;
  margin-bottom:10px;
}

.publisher{
  color:var(--muted);
  font-size:14px;
  margin-bottom:12px;
}

.meta{
  color:var(--muted);
  font-size:13px;
}

.footer{
  text-align:center;
  color:var(--muted);
  padding:35px 20px;
  border-top:1px solid var(--border);
  margin-top:40px;
}

</style>
</head>

<body>

<header class="header">

<div class="header-inner">

<div class="logo">
Traders Terminal
</div>

<div class="live">
LIVE • Auto updates every 10 seconds
</div>

</div>

</header>

<main class="main">

<div id="loading" class="loading">
Loading latest traders news...
</div>

<div id="news" class="grid"></div>

</main>

<div class="footer">
Real-time trader-critical market intelligence
</div>

<script>

function cleanTitle(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")[0]
      .trim();

  }

  return title;

}

function getSourceName(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")
      .pop()
      .trim();

  }

  return "";

}

function formatTime(dateString){

  const now = new Date();

  const date = new Date(dateString);

  const seconds =
    Math.floor((now - date)/1000);

  const minutes =
    Math.floor(seconds/60);

  const hours =
    Math.floor(minutes/60);

  const days =
    Math.floor(hours/24);

  if(minutes < 1){
    return "Just now";
  }

  if(minutes < 60){
    return minutes + " minutes ago";
  }

  if(hours < 24){
    return hours + " hours ago";
  }

  return days + " days ago";

}

async function fetchNews(){

  try{

    document.getElementById("loading").innerHTML =
      "Loading latest trader news...";

    const rssUrl =
      "https://news.google.com/rss/search?q=stock+market+crypto+bitcoin+nasdaq+federal+reserve+inflation&hl=en-US&gl=US&ceid=US:en";

    // PUBLIC CORS PROXY
    const proxy =
      "https://api.allorigins.win/raw?url=";

    const response =
      await fetch(
        proxy + encodeURIComponent(rssUrl)
      );

    const xml =
      await response.text();

    const parser =
      new DOMParser();

    const xmlDoc =
      parser.parseFromString(xml,"text/xml");

    const items =
      xmlDoc.querySelectorAll("item");

    let news = [];

    items.forEach(item=>{

      news.push({

        title:
          item.querySelector("title")
          ?.textContent || "",

        link:
          item.querySelector("link")
          ?.textContent || "",

        pubDate:
          item.querySelector("pubDate")
          ?.textContent || ""

      });

    });

    // SORT NEWEST FIRST
    news.sort((a,b)=>
      new Date(b.pubDate) -
      new Date(a.pubDate)
    );

    // REMOVE DUPLICATES
    const seen =
      new Set();

    const unique = [];

    news.forEach(item=>{

      const key =
        cleanTitle(item.title)
        .toLowerCase();

      if(!seen.has(key)){

        seen.add(key);

        unique.push(item);

      }

    });

    renderNews(unique.slice(0,100));

    document.getElementById("loading").innerHTML =
      "Showing latest trader-critical news";

  }catch(error){

    console.error(error);

    document.getElementById("loading").innerHTML =
      "Failed to fetch latest news.";

  }

}

function renderNews(news){

  const container =
    document.getElementById("news");

  let html = "";

  news.forEach((item,index)=>{

    html += `

      <article class="card">

        <div class="badge">

          ${
            index < 5
            ? 'BREAKING'
            : 'LIVE UPDATE'
          }

        </div>

        <a
          href="${item.link}"
          target="_blank"
          class="headline-link"
        >

          <h2>
            ${cleanTitle(item.title)}
          </h2>

          <div class="publisher">
            - ${getSourceName(item.title)}
          </div>

        </a>

        <div class="meta">
          ${formatTime(item.pubDate)}
        </div>

      </article>

    `;

  });

  container.innerHTML = html;

}

fetchNews();

setInterval(fetchNews,10000);

</script>

</body>
</html>
