<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traders Terminal</title>

<style>

:root{
  --bg:#050505;
  --card:#101010;
  --border:#1f1f1f;
  --text:#ffffff;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#080808;
  border-bottom:1px solid var(--border);
}

.header-inner{
  max-width:1600px;
  margin:auto;
  padding:18px 20px;
}

.logo{
  font-size:34px;
  font-weight:800;
}

.live{
  color:#ff4d4d;
  font-size:14px;
  margin-top:6px;
}

.main{
  max-width:1600px;
  margin:auto;
  padding:20px;
}

.loading{
  color:var(--muted);
  margin-bottom:20px;
  font-size:15px;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  transition:0.2s;
}

.card:hover{
  border-color:#333;
  transform:translateY(-2px);
}

.badge{
  display:inline-block;
  background:#2b0c0c;
  color:#ffb4b4;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:12px;
}

.headline-link{
  text-decoration:none;
  color:white;
}

.headline-link:hover h2{
  color:#60a5fa;
}

.card h2{
  font-size:20px;
  line-height:1.5;
  margin-bottom:10px;
}

.publisher{
  color:var(--muted);
  font-size:14px;
  margin-bottom:12px;
}

.meta{
  color:var(--muted);
  font-size:13px;
}

.footer{
  text-align:center;
  color:var(--muted);
  padding:35px 20px;
  border-top:1px solid var(--border);
  margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

  .logo{
    font-size:28px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .card h2{
    font-size:18px;
  }

}

/* TABLET */

@media(min-width:769px) and (max-width:1200px){

  .grid{
    grid-template-columns:
    repeat(2,1fr);
  }

}

/* TV / LARGE SCREENS */

@media(min-width:1600px){

  .grid{
    grid-template-columns:
    repeat(4,1fr);
  }

}

</style>

</head>

<body>

<header class="header">

<div class="header-inner">

<div class="logo">
Traders Terminal
</div>

<div class="live">
LIVE • Auto updates every 10 seconds
</div>

</div>

</header>

<main class="main">

<div id="loading" class="loading">
Loading latest traders market news...
</div>

<div id="news" class="grid"></div>

</main>

<div class="footer">
Real-time traders market intelligence
</div>

<script>

// CLEAN TITLE
function cleanTitle(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")[0]
      .trim();

  }

  return title;

}

// SOURCE NAME
function getSourceName(title){

  if(title.includes(" - ")){

    return title
      .split(" - ")
      .pop()
      .trim();

  }

  return "";

}

// TIME FORMAT
function formatTime(dateString){

  const now = new Date();

  const date = new Date(dateString);

  const seconds =
    Math.floor((now - date)/1000);

  const minutes =
    Math.floor(seconds/60);

  const hours =
    Math.floor(minutes/60);

  const days =
    Math.floor(hours/24);

  if(minutes < 1){
    return "Just now";
  }

  if(minutes < 60){
    return minutes + " minutes ago";
  }

  if(hours < 24){
    return hours + " hours ago";
  }

  if(days <= 7){
    return days + " days ago";
  }

  return null;

}

async function fetchNews(){

  try{

    document.getElementById("loading").innerHTML =
      "Loading latest traders market news...";

    // BROAD MARKET FEED
    const rssUrl =
      "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en";

    // RELIABLE CORS PROXY
    const proxy =
      "https://corsproxy.io/?";

    const response =
      await fetch(
        proxy + encodeURIComponent(rssUrl)
      );

    const xml =
      await response.text();

    const parser =
      new DOMParser();

    const xmlDoc =
      parser.parseFromString(xml,"text/xml");

    const items =
      xmlDoc.querySelectorAll("item");

    let news = [];

    items.forEach(item=>{

      const title =
        item.querySelector("title")
        ?.textContent || "";

      const lower =
        title.toLowerCase();

      // TRADER FILTER
      if(

        lower.includes("market") ||
        lower.includes("stocks") ||
        lower.includes("stock") ||
        lower.includes("crypto") ||
        lower.includes("bitcoin") ||
        lower.includes("ethereum") ||
        lower.includes("nasdaq") ||
        lower.includes("dow") ||
        lower.includes("s&p") ||
        lower.includes("inflation") ||
        lower.includes("federal reserve") ||
        lower.includes("interest rate") ||
        lower.includes("economy") ||
        lower.includes("oil") ||
        lower.includes("nvidia") ||
        lower.includes("tesla") ||
        lower.includes("apple") ||
        lower.includes("microsoft") ||
        lower.includes("amazon")

      ){

        news.push({

          title:title,

          link:
            item.querySelector("link")
            ?.textContent || "",

          pubDate:
            item.querySelector("pubDate")
            ?.textContent || ""

        });

      }

    });

    // SORT LATEST FIRST
    news.sort((a,b)=>
      new Date(b.pubDate) -
      new Date(a.pubDate)
    );

    // REMOVE DUPLICATES
    const seen = new Set();

    const unique = [];

    news.forEach(item=>{

      const key =
        cleanTitle(item.title)
        .toLowerCase()
        .trim();

      if(!seen.has(key)){

        seen.add(key);

        unique.push(item);

      }

    });

    // STRICT LATEST FILTER
    let latestOnly =
      unique.filter(item=>{

        const diffHours =
          (new Date() - new Date(item.pubDate))
          / 1000 / 60 / 60;

        return diffHours <= 72;

      });

    // IF LESS THAN 50 NEWS,
    // ALLOW UP TO 7 DAYS
    if(latestOnly.length < 50){

      latestOnly =
        unique.filter(item=>{

          const diffDays =
            (new Date() - new Date(item.pubDate))
            / 1000 / 60 / 60 / 24;

          return diffDays <= 7;

        });

    }

    renderNews(
      latestOnly.slice(0,100)
    );

    document.getElementById("loading").innerHTML =
      "Showing latest traders market news";

  }catch(error){

    console.error(error);

    document.getElementById("loading").innerHTML =
      "Failed to fetch latest news.";

  }

}

function renderNews(news){

  const container =
    document.getElementById("news");

  let html = "";

  news.forEach((item,index)=>{

    const title =
      cleanTitle(item.title);

    const time =
      formatTime(item.pubDate);

    if(!time) return;

    html += `

      <article class="card">

        <div class="badge">

          ${
            index < 5
            ? 'BREAKING'
            : 'LIVE UPDATE'
          }

        </div>

        <a
          href="${item.link}"
          target="_blank"
          class="headline-link"
        >

          <h2>
            ${title}
          </h2>

          <div class="publisher">
            - ${getSourceName(item.title)}
          </div>

        </a>

        <div class="meta">
          ${time}
        </div>

      </article>

    `;

  });

  container.innerHTML = html;

}

// INITIAL LOAD
fetchNews();

// AUTO REFRESH EVERY 10 SECONDS
setInterval(fetchNews,10000);

</script>

</body>
</html>
